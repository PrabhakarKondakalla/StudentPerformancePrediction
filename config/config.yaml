project_name: student_performance_prediction
target_column: math score
problem_type: regression
test_size: 0.2
random_state: 42
drop_columns: []

paths:
  raw_data: data/raw/StudentsPerformance.csv
  train_data: data/interim/train.csv
  test_data: data/interim/test.csv
  preprocessor: artifacts/preprocessor.joblib
  model: artifacts/model.joblib
  metrics: artifacts/metrics.json

xgboost:
  n_estimators: 200
  learning_rate: 0.05
  max_depth: 5
  subsample: 0.9
  colsample_bytree: 0.9
  reg_alpha: 0.0
  reg_lambda: 1.0
